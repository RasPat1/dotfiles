# ============================================================
#  Solarized Dark — tmux theme (converted from "Reflection").
#  Tuned for Claude Code + parallel agentic workflows.
#  Palette: Ethan Schoonover's Solarized (dark variant).
#  Truecolor required (tmux >= 3.2 recommended).
#  Install:  cp this file to ~/.tmux.conf  &&  tmux source ~/.tmux.conf
# ============================================================

# ---- Palette (Solarized Dark; edit here, used throughout) --
# Variable names are legacy (from the cream "Reflection" theme); the
# VALUES are now Solarized Dark, so the rest of the config maps cleanly.
%hidden PAPER="#eee8d5"        # base2   — bright text / active window pill
%hidden PAPER_DEEP="#93a1a1"   # base1   — emphasized text
%hidden INK="#073642"          # base02  — status bar bg, dark text on pills
%hidden INK_SOFT="#002b36"     # base03  — deepest background
%hidden MUTE="#586e75"         # base01  — separators / borders
%hidden MUTE_SOFT="#657b83"    # base00  — dim text
%hidden INDIGO="#268bd2"       # blue
%hidden LAKE="#268bd2"         # blue    — cpu
%hidden LILAC="#6c71c4"        # violet  — mem
%hidden CYAN="#2aa198"         # cyan    — disk
%hidden MAGENTA="#d33682"      # magenta — session / accents
%hidden ROSE="#dc322f"         # red
%hidden PEACH="#cb4b16"        # orange  — command-mode messages
%hidden EMERALD="#859900"      # green   — battery
%hidden GOLD="#b58900"         # yellow  — git dirty / activity
%hidden RULE="#586e75"         # base01  — pane borders

# ---- Core behavior -----------------------------------------
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"  # truecolor
set -g  mouse on                       # scroll, click panes, drag borders
set -g  prefix C-b                     # default prefix (Ctrl-b)
set -g  base-index 1                   # windows start at 1
setw -g pane-base-index 1              # panes start at 1
set -g  renumber-windows on
set -g  history-limit 50000            # long agent logs
set -sg escape-time 0                  # snappy ESC
set -g  focus-events on                # editors/agents see focus
set -g  display-time 1500
set -g  set-clipboard on
setw -g aggressive-resize on
set -g  allow-rename off               # keep window names you set

# ---- Status bar --------------------------------------------
set -g status on
set -g status-interval 5               # refresh cpu/clock every 5s
set -g status-position bottom
set -g status-justify left
# Solarized bar — base02 sits one step above the base03 terminal background,
# with base2 text for high contrast. Looks right on a Solarized Dark terminal.
set -g status-style "bg=${INK},fg=${PAPER}"

# session segment — solid accent block
set -g status-left-length 40
set -g status-left "#[bg=${MAGENTA},fg=${PAPER},bold] ◆ #S #[bg=${INK}] #[default]"

# window list — active window is a cream pill on the ink bar
setw -g window-status-separator ""
setw -g window-status-format "#[fg=${MUTE_SOFT}] #I #W #[default]"
setw -g window-status-current-format "#[bg=${PAPER},fg=${INK},bold] #I #W #[bg=${INK}]#[default]"
setw -g window-status-activity-style "fg=${GOLD}"

# right side — agents · dir · git · cpu · mem · battery · clock
#   #(...) shells out; the scripts below are macOS-first with Linux notes.
set -g status-right-length 170
set -g status-right "\
#[fg=${MAGENTA}]◐ #[fg=${PAPER}]#(tmux list-panes -s -F '#{pane_pid}' | wc -l | tr -d ' ') panes \
#[fg=${MUTE}]│ #[fg=${MUTE_SOFT}]#{b:pane_current_path} \
#[fg=${MUTE}]│ #[fg=${PAPER}]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null)#[fg=${GOLD}]#(cd #{pane_current_path}; s=$(git status --porcelain 2>/dev/null | wc -l | tr -d ' '); [ \"$s\" != 0 ] && echo \" ●$s\") \
#[fg=${MUTE}]│ #[fg=${MUTE_SOFT}]cpu #[fg=${LAKE}]#(~/.tmux/reflection-cpu.sh) \
#[fg=${MUTE_SOFT}]mem #[fg=${LILAC}]#(~/.tmux/reflection-mem.sh) \
#[fg=${MUTE_SOFT}]disk #[fg=${CYAN}]#(~/.tmux/reflection-disk.sh) \
#[fg=${MUTE}]│ #[fg=${EMERALD}]↯ #[fg=${PAPER}]#(~/.tmux/reflection-batt.sh) \
#[fg=${MUTE}]│ #[fg=${PAPER},bold] %H:%M "

# ---- Panes -------------------------------------------------
set -g pane-border-style "fg=${RULE}"
set -g pane-active-border-style "fg=${MAGENTA}"
set -g pane-border-status top
set -g pane-border-format " #[fg=#{?pane_active,${MAGENTA},${MUTE_SOFT}}]#{?pane_active,●,○} #[fg=#{?pane_active,${INK},${MUTE}}]#P #{pane_current_command} "
set -g display-panes-colour "${MUTE}"
set -g display-panes-active-colour "${MAGENTA}"

# ---- Messages / mode (copy, command line) ------------------
set -g message-style "bg=${INK},fg=${PAPER}"
set -g message-command-style "bg=${INK},fg=${PEACH}"
setw -g mode-style "bg=${LILAC},fg=${INK}"
set -g clock-mode-colour "${MAGENTA}"

# ============================================================
#  Keybindings — agentic-workflow ergonomics
# ============================================================

# reload config
bind r source-file ~/.tmux.conf \; display "  reflection reloaded  "

# intuitive splits, keep the current directory
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# vim-ish pane nav (works alongside mouse)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes (repeatable: hold prefix-released, tap HJKL)
bind -r H resize-pane -L 4
bind -r J resize-pane -D 4
bind -r K resize-pane -U 4
bind -r L resize-pane -R 4

# zoom the active pane (focus one agent fullscreen)
bind Enter resize-pane -Z

# ---- Agentic layouts ----------------------------------------
# prefix + A  →  "mission control": big agent left, agent/dev/git stacked right
bind A \
  split-window -h -p 40 -c "#{pane_current_path}" \; \
  split-window -v -p 66 -c "#{pane_current_path}" \; \
  split-window -v -p 50 -c "#{pane_current_path}" \; \
  select-pane -t 1 \; \
  display "  mission-control layout  "

# prefix + P  →  parallel agents: even 2x2 grid for up to 4 agents
bind P \
  split-window -h -c "#{pane_current_path}" \; \
  split-window -v -c "#{pane_current_path}" \; \
  select-pane -t 1 \; \
  split-window -v -c "#{pane_current_path}" \; \
  select-layout tiled \; \
  select-pane -t 1 \; \
  display "  parallel-agents layout  "

# prefix + G  →  scratch popup (quick git / shell without leaving your agents)
bind G display-popup -E -w 80% -h 70% -d "#{pane_current_path}"

# prefix + S  →  fuzzy session/window switcher (tree view)
bind S choose-tree -Zw

# sync toggle — type once into all panes (e.g. cd into all agents)
bind y setw synchronize-panes \; display "  sync-panes #{?synchronize-panes,on,off}  "

# copy-mode = vi keys; y to yank, v to select
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ============================================================
#  Helper scripts for the status bar (write once, chmod +x):
#    mkdir -p ~/.tmux
#
#  ~/.tmux/reflection-cpu.sh   (macOS)
#    #!/bin/sh
#    ps -A -o %cpu | awk '{s+=$1} END {printf "%d%%", s/'"$(sysctl -n hw.ncpu)"'}'
#    # Linux:  top -bn1 | awk '/Cpu/{printf "%d%%",100-$8}'
#
#  ~/.tmux/reflection-mem.sh   (macOS)
#    #!/bin/sh
#    ps -caxm -orss | awk '{s+=$1} END {printf "%.1fG", s/1048576}'
#    # Linux:  free -g | awk '/Mem:/{printf "%dG",$3}'
#
#  ~/.tmux/reflection-batt.sh  (macOS)
#    #!/bin/sh
#    pmset -g batt | grep -Eo '[0-9]+%' | head -1
#    # Linux:  cat /sys/class/power_supply/BAT0/capacity | sed 's/$/%/'
#
#  No battery (desktop)? Delete the "↯" segment from status-right above.
# ============================================================

